<div class="max-w-3xl mx-auto pb-12">
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-900">Créer un Compte Employé</h1>
    <p class="text-gray-500 text-sm mt-1">Ajoutez un nouveau membre au personnel de la banque.</p>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sm:p-8">
    <div
      *ngIf="formError"
      class="bg-red-50 text-red-600 text-sm p-4 rounded-lg mb-6 border border-red-100"
    >
      {{ formError }}
    </div>

    <div
      *ngIf="successMessage"
      class="bg-green-50 text-green-700 text-sm p-4 rounded-lg mb-6 border border-green-100 flex items-center gap-2"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M5 13l4 4L19 7"
        ></path>
      </svg>
      {{ successMessage }} Redirection en cours...
    </div>

    <form (ngSubmit)="onSubmit()" #employeeForm="ngForm" class="space-y-6">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Nom complet *</label>
          <input
            type="text"
            name="name"
            [(ngModel)]="newEmployee.name"
            required
            placeholder="Ex: Ahmed Yassine"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Adresse Email *</label>
          <input
            type="email"
            name="email"
            [(ngModel)]="newEmployee.email"
            required
            placeholder="employe@bank.com"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm"
          />
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 pt-2">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Rôle</label>
          <select
            name="role"
            [(ngModel)]="newEmployee.role"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm bg-white"
          >
            <option value="ADMIN">ADMIN</option>
            <option value="GUICHETIER">GUICHETIER</option>
            <option value="DA">DA</option>
            <option value="MANAGER">MANAGER</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Agence</label>
          <select
            name="agence"
            [(ngModel)]="newEmployee.agence"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm bg-white"
          >
            <option value="Casablanca">Casablanca</option>
            <option value="Marrakech">Marrakech</option>
            <option value="Rabat">Rabat</option>
            <option value="N/A">N/A</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Division</label>
          <input
            type="text"
            name="division"
            [(ngModel)]="newEmployee.division"
            placeholder="Ex: IT, Service Client"
            class="w-full px-4 py-2.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm"
          />
        </div>
      </div>

      <div class="pt-6 border-t border-gray-100 flex justify-end gap-3">
        <button
          type="button"
          (click)="employeeForm.resetForm()"
          class="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-700 font-medium hover:bg-gray-50 transition-colors text-sm"
        >
          Annuler
        </button>
        <button
          type="submit"
          [disabled]="!employeeForm.form.valid || submitting"
          class="bg-gray-900 hover:bg-black text-white font-bold py-2.5 px-6 rounded-lg transition-colors flex justify-center items-center shadow-sm disabled:opacity-70 text-sm"
        >
          <span *ngIf="!submitting">Créer le compte</span>
          <svg
            *ngIf="submitting"
            class="animate-spin h-5 w-5 text-white"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
        </button>
      </div>
    </form>
  </div>
</div>
