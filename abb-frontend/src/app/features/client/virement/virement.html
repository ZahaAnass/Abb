<div class="max-w-4xl mx-auto">
  
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-900">Effectuer un virement</h1>
    <p class="text-gray-500 text-sm mt-1">Transférez de l'argent en toute sécurité vers des comptes Al Barid Bank ou confrères.</p>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden pb-8">
    
    <div *ngIf="successMessage" class="bg-green-50 border-l-4 border-green-500 p-4 m-6 rounded-md flex items-center gap-3">
      <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <p class="text-sm text-green-800 font-medium">{{ successMessage }}</p>
    </div>

    <div *ngIf="errorMessage" class="bg-red-50 border-l-4 border-red-500 p-4 m-6 rounded-md flex items-center gap-3">
      <svg class="w-6 h-6 text-red-600 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <p class="text-sm text-red-800 font-medium">{{ errorMessage }}</p>
    </div>

    <form (ngSubmit)="onSubmit()" #virementForm="ngForm" class="p-6 sm:p-8 space-y-6">
      
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Compte à débiter</label>
        <div class="relative">
          <select 
            name="sourceAccount" 
            [(ngModel)]="sourceAccountRib" 
            required
            class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-abb-yellow focus:border-abb-yellow outline-none appearance-none transition-all font-medium text-gray-800 disabled:opacity-70">
            
            <option *ngIf="myAccount" [value]="myAccount.rib">
              Compte Courant - {{ myAccount.rib }} ({{ myAccount.solde | number:'1.2-2' }} MAD)
            </option>
            <option *ngIf="!myAccount" value="">Chargement de vos comptes...</option>
            
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </div>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">RIB du bénéficiaire (24 chiffres)</label>
        <input 
          type="text" 
          name="beneficiaryRib" 
          [(ngModel)]="beneficiaryRib" 
          required 
          minlength="24"
          maxlength="24"
          placeholder="Ex: 350810000000000000000001"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-abb-yellow focus:border-abb-yellow outline-none transition-all tracking-widest font-mono text-gray-800"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Montant</label>
        <div class="relative">
          <input 
            type="number" 
            name="amount" 
            [(ngModel)]="amount" 
            required 
            min="1"
            placeholder="0.00"
            class="w-full pl-4 pr-16 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-abb-yellow focus:border-abb-yellow outline-none transition-all text-xl font-bold text-gray-900"
          />
          <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
            <span class="text-gray-500 font-bold">MAD</span>
          </div>
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Motif du virement (Optionnel)</label>
        <input 
          type="text" 
          name="motif" 
          [(ngModel)]="motif" 
          placeholder="Ex: Loyer de Mars"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-abb-yellow focus:border-abb-yellow outline-none transition-all"
        />
      </div>

      <div class="pt-4 border-t border-gray-100">
        <button 
          type="submit" 
          [disabled]="!virementForm.form.valid || loading || !myAccount"
          class="w-full sm:w-auto sm:float-right bg-abb-dark hover:bg-gray-800 text-white font-bold py-3 px-8 rounded-lg transition-colors flex justify-center items-center shadow-md disabled:opacity-70">
          <span *ngIf="!loading">Valider le virement</span>
          <svg *ngIf="loading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </button>
      </div>

    </form>
  </div>
</div>
