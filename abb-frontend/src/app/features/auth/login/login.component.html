<div class="min-h-screen flex items-center justify-center bg-slate-50">
  <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
    <div class="text-center mb-8">
      <div
        class="w-16 h-16 bg-blue-600 text-white rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold shadow-md"
      >
        ABB
      </div>
      <h2 class="text-2xl font-bold text-gray-800">Bienvenue à Al Barid Bank</h2>
      <p class="text-gray-500 mt-2 text-sm">Veuillez vous connecter à votre espace</p>
    </div>

    <div *ngIf="errorMessage" class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-md">
      <p class="text-sm text-red-700 font-medium">{{ errorMessage }}</p>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1"
          >Adresse Email</label
        >
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all outline-none"
          placeholder="admin@bank.com"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1"
          >Mot de passe</label
        >
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all outline-none"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="!loginForm.form.valid"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-all transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed shadow-md"
      >
        Connexion
      </button>
    </form>
  </div>
</div>
