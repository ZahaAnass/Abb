<!--

  Replace the existing file content with this

<div class="h-screen w-full flex overflow-hidden font-sans" style="background:#0F0F0E;">

  <!-- Mobile Overlay -->
  <div
    *ngIf="isMobileMenuOpen"
    class="fixed inset-0 z-20 md:hidden"
    style="background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);"
    (click)="closeMobileMenu()"
  ></div>

  <!-- ══════════════════════════════════════════════════════════════════ 
       SIDEBAR 
  ══════════════════════════════════════════════════════════════════ -->
  <aside
    [ngClass]="isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'"
    class="w-[260px] shrink-0 fixed inset-y-0 left-0 h-full z-30 flex flex-col transition-transform duration-300 ease-in-out md:translate-x-0 md:static"
    style="background:#111110;border-right:1px solid rgba(255,255,255,0.06);"
  >
    <!-- Gold vertical accent -->
    <div class="absolute top-0 right-0 w-px h-full pointer-events-none" style="background:linear-gradient(to bottom,transparent,rgba(220,168,25,0.25) 20%,rgba(220,168,25,0.25) 80%,transparent);"></div>

    <!-- Logo -->
    <div class="h-[72px] shrink-0 flex items-center px-6" style="border-bottom:1px solid rgba(255,255,255,0.05);">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 flex items-center justify-center shrink-0" style="border:1px solid rgba(220,168,25,0.35);">
          <img src="logo.png" alt="Al Barid Bank" style="height:22px;width:auto;filter:brightness(0) invert(1) opacity(0.9);" />
        </div>
        <div>
          <div style="font-family:'Playfair Display',Georgia,serif;font-size:0.875rem;font-weight:500;color:#F5F0E8;letter-spacing:0.03em;">Al Barid Bank</div>
          <div style="font-size:0.55rem;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:rgba(220,168,25,0.6);margin-top:1px;">Client Space</div>
        </div>
      </div>
    </div>

    <!-- Account Balance Card -->
    <div class="mx-4 my-5 p-4 rounded-xl relative overflow-hidden" style="background:linear-gradient(135deg,rgba(220,168,25,0.12) 0%,rgba(220,168,25,0.05) 100%);border:1px solid rgba(220,168,25,0.2);">
      <!-- Corner ornament -->
      <div class="absolute top-0 right-0 w-8 h-8" style="border-top:1px solid rgba(220,168,25,0.3);border-right:1px solid rgba(220,168,25,0.3);"></div>
      <div style="font-size:0.55rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:rgba(220,168,25,0.6);margin-bottom:0.5rem;">Your Account</div>
      <div style="font-family:'Playfair Display',Georgia,serif;font-size:1.5rem;font-weight:500;color:#F5F0E8;line-height:1;">
        — MAD
      </div>
      <div style="font-size:0.6rem;color:rgba(255,255,255,0.3);margin-top:0.4rem;letter-spacing:0.05em;">Available balance</div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-2 px-4">

      <div style="font-size:0.55rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.2);padding:0 0.75rem;margin-bottom:0.75rem;">Banking</div>

      <ul class="space-y-0.5 mb-6">
        <li>
          <a routerLink="/client/dashboard" routerLinkActive="abb-nav-active" [routerLinkActiveOptions]="{exact:false}"
            class="abb-nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all"
            (click)="closeMobileMenu()">
            <div class="abb-nav-icon w-8 h-8 rounded-md flex items-center justify-center shrink-0 transition-all">
              <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" stroke-width="1.6"/><rect x="14" y="3" width="7" height="7" rx="1" stroke-width="1.6"/><rect x="3" y="14" width="7" height="7" rx="1" stroke-width="1.6"/><rect x="14" y="14" width="7" height="7" rx="1" stroke-width="1.6"/></svg>
            </div>
            <span class="abb-nav-label font-medium">Dashboard</span>
          </a>
        </li>
        <li>
          <a routerLink="/client/history" routerLinkActive="abb-nav-active" [routerLinkActiveOptions]="{exact:false}"
            class="abb-nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all"
            (click)="closeMobileMenu()">
            <div class="abb-nav-icon w-8 h-8 rounded-md flex items-center justify-center shrink-0 transition-all">
              <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke-width="1.6" stroke-linecap="round"/><path d="M9 12l2 2 4-4" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <span class="abb-nav-label font-medium">History</span>
          </a>
        </li>
        <li>
          <a routerLink="/client/virement" routerLinkActive="abb-nav-active" [routerLinkActiveOptions]="{exact:false}"
            class="abb-nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all"
            (click)="closeMobileMenu()">
            <div class="abb-nav-icon w-8 h-8 rounded-md flex items-center justify-center shrink-0 transition-all">
              <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <span class="abb-nav-label font-medium">Transfer</span>
            <!-- Gold indicator dot for quick action -->
            <span class="ml-auto w-1.5 h-1.5 rounded-full shrink-0" style="background:#DCA819;opacity:0.7;"></span>
          </a>
        </li>
      </ul>

      <!-- Quick Transfer CTA -->
      <div class="px-2 pb-4">
        <a routerLink="/client/virement" class="flex items-center justify-center gap-2 w-full py-2.5 rounded-xl text-sm font-semibold transition-all hover:opacity-90 active:scale-[0.98]" style="background:#DCA819;color:#0D0D0C;" (click)="closeMobileMenu()">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-width="2.2" stroke-linecap="round"/></svg>
          New Transfer
        </a>
      </div>
    </nav>

    <!-- User Footer -->
    <div class="shrink-0 p-4" style="border-top:1px solid rgba(255,255,255,0.05);">
      <div class="flex items-center gap-3 p-3 rounded-xl" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center text-sm font-bold shrink-0" style="background:#DCA819;color:#0D0D0C;">
          {{ userEmail.charAt(0).toUpperCase() }}
        </div>
        <div class="flex-1 min-w-0">
          <div style="font-size:0.75rem;font-weight:600;color:#F5F0E8;" class="truncate">{{ userEmail }}</div>
          <div style="font-size:0.6rem;color:rgba(220,168,25,0.7);font-weight:500;text-transform:uppercase;letter-spacing:0.1em;margin-top:1px;">Client</div>
        </div>
        <button (click)="onLogout()" class="shrink-0 transition-opacity hover:opacity-60" style="color:rgba(255,255,255,0.3);" title="Logout">
          <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ══════════════════════════════════════════════════════════════════ 
       MAIN CONTENT 
  ══════════════════════════════════════════════════════════════════ -->
  <div class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden" style="background:#F8F7F5;">

    <!-- Top Header -->
    <header class="shrink-0 flex items-center justify-between px-6 lg:px-8" style="height:72px;background:#FFFFFF;border-bottom:1px solid rgba(0,0,0,0.06);box-shadow:0 1px 0 rgba(0,0,0,0.04);">

      <div class="flex items-center gap-4">
        <button (click)="toggleMobileMenu()" class="md:hidden p-2 rounded-lg transition-colors hover:bg-gray-100" style="color:#6B7280;">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>

        <div class="hidden sm:flex items-center gap-2">
          <span style="font-size:0.65rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#DCA819;">Al Barid Bank</span>
          <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:#D1D5DB;"><path d="M9 18l6-6-6-6" stroke-width="2" stroke-linecap="round"/></svg>
          <span style="font-size:0.65rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#9CA3AF;">Client Space</span>
        </div>
      </div>

      <div class="flex items-center gap-3">
        <!-- Security badge -->
        <div class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-full" style="background:#F0FDF4;border:1px solid #BBF7D0;">
          <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:#15803D;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke-width="2" stroke-linecap="round"/></svg>
          <span style="font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#15803D;">Secured</span>
        </div>

        <div class="hidden sm:block w-px h-5" style="background:#E5E7EB;"></div>

        <div class="flex items-center gap-2 px-3 py-1.5 rounded-full" style="background:#F9FAFB;border:1px solid #E5E7EB;">
          <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold" style="background:#DCA819;color:#0D0D0C;">
            {{ userEmail.charAt(0).toUpperCase() }}
          </div>
          <span class="hidden md:block" style="font-size:0.75rem;font-weight:600;color:#374151;">{{ userEmail }}</span>
        </div>

        <button (click)="onLogout()" class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-semibold transition-all hover:bg-red-50" style="color:#9CA3AF;">
          <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="hidden sm:block">Logout</span>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto" style="padding:2rem 2rem 3rem;">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap');

.abb-nav-item {
  color: rgba(255,255,255,0.45);
  text-decoration: none;
}
.abb-nav-item:hover {
  color: rgba(255,255,255,0.85);
  background: rgba(255,255,255,0.05) !important;
}
.abb-nav-icon {
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.4);
}
.abb-nav-item:hover .abb-nav-icon {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.7);
}
.abb-nav-active {
  color: #DCA819 !important;
  background: rgba(220,168,25,0.1) !important;
}
.abb-nav-active .abb-nav-icon {
  background: rgba(220,168,25,0.15) !important;
  color: #DCA819 !important;
}
</style>
