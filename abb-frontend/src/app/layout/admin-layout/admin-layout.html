<div class="h-screen w-full bg-gray-50 flex overflow-hidden">
  
  <div
    *ngIf="isMobileMenuOpen"
    class="fixed inset-0 bg-gray-900/60 z-20 md:hidden backdrop-blur-sm transition-opacity"
    (click)="closeMobileMenu()"
  ></div>

  <aside
    [ngClass]="isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'"
    class="w-64 shrink-0 bg-abb-dark fixed inset-y-0 left-0 h-full z-30 flex flex-col transition-transform duration-300 ease-in-out md:translate-x-0 md:static shadow-2xl md:shadow-none border-r border-gray-800"
  >
    <div class="h-20 shrink-0 flex items-center justify-center bg-abb-dark border-b border-abb-dark px-4">
      <img src="logo.png" alt="Al Barid Bank" class="h-12 w-auto object-contain" />
    </div>

    <nav class="p-4 flex-1 overflow-y-auto mt-2">
      <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-4 block px-4">
        Espace Administration
      </span>

      <ul class="space-y-1">
        <li>
          <a
            routerLink="/admin/dashboard"
            routerLinkActive="bg-abb-yellow/10 text-abb-yellow border-r-4 border-abb-yellow"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-white/5 hover:text-white font-medium transition-all"
            (click)="closeMobileMenu()"
          >
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="truncate">Tableau de bord</span>
          </a>
        </li>
        <li>
          <a
            routerLink="/admin/clients"
            routerLinkActive="bg-abb-yellow/10 text-abb-yellow border-r-4 border-abb-yellow"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-white/5 hover:text-white font-medium transition-all"
            (click)="closeMobileMenu()"
          >
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <span class="truncate">Gestion Clients</span>
          </a>
        </li>
        <li>
          <a
            routerLink="/admin/employees"
            routerLinkActive="bg-abb-yellow/10 text-abb-yellow border-r-4 border-abb-yellow"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-white/5 hover:text-white font-medium transition-all"
            (click)="closeMobileMenu()"
          >
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <span class="truncate">Employés</span>
          </a>
        </li>
        <li>
          <a
            routerLink="/admin/create-employee"
            routerLinkActive="bg-abb-yellow/10 text-abb-yellow border-r-4 border-abb-yellow"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-white/5 hover:text-white font-medium transition-all"
            (click)="closeMobileMenu()"
          >
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
            <span class="truncate">Créer Compte Emp</span>
          </a>
        </li>
        <li>
          <a
            routerLink="/admin/transactions"
            routerLinkActive="bg-abb-yellow/10 text-abb-yellow border-r-4 border-abb-yellow"
            class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-white/5 hover:text-white font-medium transition-all"
            (click)="closeMobileMenu()"
          >
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            <span class="truncate">Transactions</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="p-4 shrink-0 border-t border-white/10 text-center">
      <p class="text-xs text-gray-500">© 2026 Al Barid Bank</p>
    </div>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
    
    <header class="h-20 shrink-0 bg-white border-b border-gray-200 flex items-center justify-between px-4 sm:px-8 shadow-sm z-10">
      <div class="flex items-center">
        <button
          (click)="toggleMobileMenu()"
          class="md:hidden p-2 text-gray-500 hover:text-abb-yellow mr-3 rounded-md focus:outline-none bg-gray-50 border border-gray-200"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <h2 class="hidden sm:block text-xl font-bold text-gray-800 tracking-tight">
          Portail Administrateur
        </h2>
      </div>

      <div class="flex items-center gap-4 sm:gap-6">
        <div class="flex items-center gap-3">
          <div class="hidden sm:block text-right">
            <p class="text-sm font-bold text-gray-900">{{ userEmail }}</p>
            <p class="text-xs text-gray-500 capitalize font-medium">{{ userRole }}</p>
          </div>
          <div class="w-10 h-10 shrink-0 bg-yellow-100 rounded-full flex items-center justify-center text-abb-yellow font-bold border border-yellow-200 shadow-sm">
            {{ userEmail.charAt(0).toUpperCase() }}
          </div>
        </div>

        <div class="h-8 w-px bg-gray-200"></div>

        <button (click)="onLogout()" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-full transition-all" title="Déconnexion">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 sm:p-8 bg-gray-50/50 relative">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
